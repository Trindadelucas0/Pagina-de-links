<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Paulo Dias - Contador | Êxito Contabilidade - Links oficiais">
  <meta name="author" content="Paulo Dias">
  <title>Paulo Dias | Êxito Contabilidade</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Main Container -->
  <div class="container">
    <div class="card">

      <!-- Profile Section -->
      <div class="profile fade-in">
        <div class="profile-photo-wrapper">
          <img 
            src="assets/foto.png.jpg" 
            alt="Paulo Dias - Êxito Contabilidade" 
            class="profile-photo"
            id="profile-img"
          >
        </div>
        <h1 class="profile-name">Paulo Dias</h1>
        <span class="profile-username">
          @paulodiascontador <i class="fab fa-instagram"></i>
        </span>
      </div>

      <!-- Theme Toggle -->
      <div class="theme-toggle fade-in">
        <button class="toggle-btn" id="theme-toggle" aria-label="Alternar tema">
          <i class="fas fa-moon"></i>
          <div class="toggle-track">
            <div class="toggle-thumb"></div>
          </div>
          <i class="fas fa-sun"></i>
        </button>
      </div>

      <!-- Links -->
      <div class="links">
        <a 
          href="https://www.instagram.com/paulodiascontador" 
          target="_blank" 
          rel="noopener noreferrer"
          class="link-btn fade-in-link"
          id="link-instagram"
        >
          <i class="fab fa-instagram"></i>
          INSTAGRAM
        </a>

        <a 
          href="#" 
          target="_blank" 
          rel="noopener noreferrer"
          class="link-btn fade-in-link"
          id="link-whatsapp"
        >
          <i class="fab fa-whatsapp"></i>
          WHATSAPP
        </a>

        <a 
          href="https://www.exitocon.com.br/importacao" 
          target="_blank" 
          rel="noopener noreferrer"
          class="link-btn fade-in-link"
          id="link-contabilidade"
        >
          <i class="fas fa-file-invoice-dollar"></i>
          CONTABILIDADE IMPORTAÇÃO
        </a>

        <a 
          href="https://www.exitocon.com.br" 
          target="_blank" 
          rel="noopener noreferrer"
          class="link-btn fade-in-link"
          id="link-contabilidade-ampla"
        >
          <i class="fas fa-building"></i>
          CONTABILIDADE
        </a>
      </div>

      <!-- Social Icons -->
      <div class="social-icons fade-in">
        <a 
          href="https://www.instagram.com/paulodiascontador" 
          target="_blank" 
          rel="noopener noreferrer"
          class="social-icon" 
          aria-label="Instagram"
          id="social-instagram"
        >
          <i class="fab fa-instagram"></i>
        </a>
        <a 
          href="#" 
          target="_blank" 
          rel="noopener noreferrer"
          class="social-icon" 
          aria-label="WhatsApp"
          id="social-whatsapp"
        >
          <i class="fab fa-whatsapp"></i>
        </a>
        <a 
          href="https://www.exitocon.com.br/importacao" 
          target="_blank" 
          rel="noopener noreferrer"
          class="social-icon" 
          aria-label="Contabilidade"
          id="social-contabilidade"
        >
          <i class="fas fa-file-invoice-dollar"></i>
        </a>
        <a 
          href="https://www.exitocon.com.br" 
          target="_blank" 
          rel="noopener noreferrer"
          class="social-icon" 
          aria-label="Êxito Contabilidade"
          id="social-exitocon"
        >
          <i class="fas fa-globe"></i>
        </a>
      </div>

      <!-- Footer -->
      <div class="footer fade-in">
        <p>
          © Êxito Contabilidade
          <i class="fas fa-link" style="font-size: 0.65rem; color: var(--green-primary);"></i>
        </p>
      </div>

    </div>
  </div>

  <!-- JavaScript -->
  <script src="script.js"></script>
</body>
</html>
